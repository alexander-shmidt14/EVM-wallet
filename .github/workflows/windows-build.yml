# ─── Build & Release: Windows Desktop ───────────────────────────────
# Triggers:
#   - Push to staging or main → builds installer, uploads as artifact
#   - Tag v* → builds + creates GitHub Release with downloadable .exe
#   - Manual dispatch (workflow_dispatch) for ad-hoc builds
name: Windows Build

on:
  push:
    branches: [staging, main]
    tags: ["v*"]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release"
        type: boolean
        default: false

concurrency:
  group: win-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  build-windows:
    name: "Build Windows Installer"
    runs-on: windows-latest
    permissions:
      contents: write        # needed for gh-release

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wallet-core
        run: pnpm -F @wallet/wallet-core build

      - name: Build ui-tokens
        run: pnpm -F @wallet/ui-tokens build

      - name: Build main process (Electron)
        run: pnpm -F @app/desktop build:main
        env:
          NODE_ENV: production

      - name: Build renderer (Vite)
        run: pnpm -F @app/desktop build:renderer
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          if (!(Test-Path "apps\desktop\dist\main.js")) { Write-Error "main.js not found"; exit 1 }
          if (!(Test-Path "apps\desktop\dist\renderer\index.html")) { Write-Error "renderer not found"; exit 1 }
          Write-Host "✅ Build outputs verified"
        shell: powershell

      - name: Package with electron-builder (win-unpacked)
        run: |
          cd apps/desktop
          npx electron-builder --win --dir --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build NSIS installer
        run: |
          Copy-Item "apps\desktop\assets\icon.ico" "apps\desktop\release\icon.ico" -Force
          $nsis = Get-ChildItem "$env:LOCALAPPDATA\electron-builder\Cache\nsis" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($nsis) {
            Write-Host "Building NSIS installer with: $($nsis.FullName)"
            & $nsis.FullName "apps\desktop\release\installer.nsi"
          } else {
            Write-Host "⚠️ NSIS not found in electron-builder cache, trying system NSIS..."
            $sysNsis = Get-Command "makensis" -ErrorAction SilentlyContinue
            if ($sysNsis) {
              & makensis "apps\desktop\release\installer.nsi"
            } else {
              Write-Error "NSIS not found. Cannot build installer."
              exit 1
            }
          }
        shell: powershell

      - name: Generate checksums
        run: |
          cd apps/desktop/release
          Get-ChildItem *.exe -ErrorAction SilentlyContinue |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
              "$hash  $($_.Name)"
            } | Out-File -Encoding utf8 checksums-sha256.txt
          Write-Host "Checksums:"
          Get-Content checksums-sha256.txt
        shell: powershell

      - name: List release artifacts
        run: |
          Write-Host "=== Release artifacts ==="
          Get-ChildItem "apps\desktop\release\*.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.Name) — $([math]::Round($_.Length / 1MB, 2)) MB"
          }
        shell: powershell

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EVM-Wallet-Windows-${{ github.sha }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/checksums-sha256.txt
          retention-days: 30
          if-no-files-found: error

      - name: Upload win-unpacked (portable)
        uses: actions/upload-artifact@v4
        with:
          name: EVM-Wallet-Windows-Portable-${{ github.sha }}
          path: apps/desktop/release/win-unpacked/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/checksums-sha256.txt
          tag_name: ${{ github.ref_name }}
          name: "EVM Wallet ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
