# ─── Windows Build: Auto-produce .exe on dev ───────────────────────
# Purpose: As soon as a fix branch merges into dev (and CI passed),
#          this workflow builds the Windows .exe installer automatically.
#
# Triggers:
#   • push to dev    → fix branch merged, build .exe immediately
#   • push to staging/main → release builds
#   • tags v*        → full release with GitHub Release page
#   • manual trigger → workflow_dispatch
#
name: Windows Build

on:
  push:
    branches: [dev, staging, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build type"
        required: false
        type: choice
        options:
          - dir
          - nsis
        default: nsis

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  windows-build:
    name: "Build Windows .exe"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── Setup ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Cache Electron binary ──────────────────────────────────────
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      # ── Build shared packages ──────────────────────────────────────
      - name: Build wallet-core
        run: pnpm -F @wallet/wallet-core build

      - name: Build ui-tokens
        run: pnpm -F @wallet/ui-tokens build

      # ── Build Electron app ─────────────────────────────────────────
      - name: Build main process
        run: pnpm -F @app/desktop build:main
        env:
          NODE_ENV: production
          ALCHEMY_RPC_MAINNET: ${{ secrets.ALCHEMY_RPC_MAINNET }}
          INFURA_RPC_MAINNET: ${{ secrets.INFURA_RPC_MAINNET }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          INCOMING_ERC20_WHITELIST: ${{ vars.INCOMING_ERC20_WHITELIST }}

      - name: Build renderer
        run: pnpm -F @app/desktop build:renderer
        env:
          NODE_ENV: production

      - name: Verify build outputs
        shell: pwsh
        run: |
          $errors = 0
          @(
            "apps/desktop/dist/main.js"
            "apps/desktop/dist/renderer/index.html"
          ) | ForEach-Object {
            if (Test-Path $_) {
              Write-Host "✅ $_"
            } else {
              Write-Host "❌ MISSING: $_"
              $errors++
            }
          }
          if ($errors -gt 0) { exit 1 }

      # ── Electron Builder: directory build ──────────────────────────
      - name: Electron Builder (--dir)
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "Attempt $i of $maxRetries..."
            npx electron-builder --dir --config electron-builder-nosign.json
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Host "Failed, retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            } else {
              Write-Host "All $maxRetries attempts failed"
              exit 1
            }
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # ── NSIS Installer ─────────────────────────────────────────────
      - name: Create NSIS installer
        if: github.event.inputs.build-type != 'dir'
        working-directory: apps/desktop
        shell: pwsh
        run: |
          $maxRetries = 3
          $builderArgs = @("--win", "nsis", "--config", "electron-builder-nosign.json", "--publish", "never")
          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "Attempt $i of $maxRetries..."
            & npx electron-builder @builderArgs
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Host "Failed, retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            } else {
              Write-Host "All $maxRetries attempts failed"
              exit 1
            }
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Checksums ──────────────────────────────────────────────────
      - name: Generate checksums
        if: github.event.inputs.build-type != 'dir'
        shell: pwsh
        run: |
          $installers = Get-ChildItem -Path "apps/desktop/release" -Filter "*.exe" -File
          foreach ($f in $installers) {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash
            "$hash  $($f.Name)" | Out-File -Append "apps/desktop/release/SHA256SUMS.txt" -Encoding UTF8
            Write-Host "$hash  $($f.Name)"
          }

      # ── Upload artifacts ───────────────────────────────────────────
      - name: Upload unpacked app
        uses: actions/upload-artifact@v4
        with:
          name: "EVM-Wallet-win-unpacked-${{ github.sha }}"
          path: apps/desktop/release/win-unpacked/
          retention-days: 30

      - name: Upload installer + checksums
        if: github.event.inputs.build-type != 'dir'
        uses: actions/upload-artifact@v4
        with:
          name: "EVM-Wallet-Setup-${{ github.sha }}"
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/SHA256SUMS.txt
          retention-days: 90

      # ── Summary ────────────────────────────────────────────────────
      - name: Build summary
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "============================================"
          Write-Host "  ✅ Windows Build COMPLETE"
          Write-Host "  Branch:  ${{ github.ref_name }}"
          Write-Host "  Commit:  ${{ github.sha }}"
          Write-Host "  Trigger: ${{ github.event_name }}"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "📦 Artifacts are available in the Actions tab"
          Write-Host "   → Go to this workflow run → Artifacts section"
          Write-Host "   → Download 'EVM-Wallet-Setup-*' for the .exe installer"
          Write-Host ""

      # ── GitHub Release (tags only) ─────────────────────────────────
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
            apps/desktop/release/SHA256SUMS.txt
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
