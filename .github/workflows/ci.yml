# ─── CI: Audit, Typecheck, Test, Build Validation ───────────────────
# Triggers: every push and PR to dev / staging / main
name: CI

on:
  push:
    branches: [dev, staging, main]
  pull_request:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. Install, cache, security audit ─────────────────────────────
  install:
    name: "Install & Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high || true

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ── 2. Build shared packages ──────────────────────────────────────
  build-packages:
    name: "Build packages"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build wallet-core
        run: pnpm -F @wallet/wallet-core build

      - name: Build ui-tokens
        run: pnpm -F @wallet/ui-tokens build

      - uses: actions/cache/save@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

  # ── 3. Typecheck (matrix: wallet-core + desktop) ──────────────────
  typecheck:
    name: "Typecheck ${{ matrix.package }}"
    needs: build-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@wallet/wallet-core"
          - "@app/desktop"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Typecheck ${{ matrix.package }}
        run: pnpm -F "${{ matrix.package }}" typecheck

  # ── 4. Unit Tests + Coverage ──────────────────────────────────────
  test:
    name: "Tests"
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Run tests with coverage
        run: pnpm -F @app/desktop test -- --passWithNoTests --ci --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/desktop/coverage/
          retention-days: 14
        continue-on-error: true

  # ── 5. Full build validation (main + renderer compile) ────────────
  build-check:
    name: "Build check"
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Build main process
        run: pnpm -F @app/desktop build:main

      - name: Build renderer
        run: pnpm -F @app/desktop build:renderer

      - name: Verify build outputs exist
        run: |
          test -f apps/desktop/dist/main.js && echo "✅ main.js OK" || (echo "❌ main.js missing" && exit 1)
          test -d apps/desktop/dist/renderer && echo "✅ renderer/ OK" || (echo "❌ renderer/ missing" && exit 1)

  # ── 6. CI status gate (all checks must pass for merge) ────────────
  ci-status:
    name: "CI Status"
    if: always()
    needs: [install, build-packages, typecheck, test, build-check]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          results=("${{ needs.install.result }}" "${{ needs.build-packages.result }}" "${{ needs.typecheck.result }}" "${{ needs.test.result }}" "${{ needs.build-check.result }}")
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "❌ CI failed: one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "✅ All CI checks passed"
