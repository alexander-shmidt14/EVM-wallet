# ─── CI: Full Quality Gate ──────────────────────────────────────────
# Purpose: Block broken code from entering dev/staging/main.
#
# Workflow:
#   1. Create branch: fix/my-change (from dev)
#   2. Push commits → CI runs on the PR
#   3. ALL checks must pass before merge is allowed
#   4. If checks FAIL → merge button is disabled, dev stays clean
#   5. After merge to dev → windows-build.yml auto-produces .exe
#
name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── 1. Install dependencies + security audit ──────────────────────
  install:
    name: "Install & Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (high + critical)
        run: pnpm audit --audit-level=high || true

      - name: Check for known vulnerable packages
        run: |
          echo "=== Checking critical dependencies ==="
          pnpm list ethers --depth=0 || true
          pnpm list electron --depth=0 || true
          echo "✅ Dependency check complete"

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ── 2. Build shared packages ──────────────────────────────────────
  build-packages:
    name: "Build shared packages"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build wallet-core
        run: pnpm -F @wallet/wallet-core build

      - name: Verify wallet-core output
        run: |
          test -f packages/wallet-core/dist/index.js && echo "✅ wallet-core/dist/index.js" || (echo "❌ missing" && exit 1)
          test -f packages/wallet-core/dist/index.d.ts && echo "✅ wallet-core/dist/index.d.ts" || (echo "❌ missing" && exit 1)

      - name: Build ui-tokens
        run: pnpm -F @wallet/ui-tokens build

      - name: Verify ui-tokens output
        run: |
          test -f packages/ui-tokens/dist/index.js && echo "✅ ui-tokens/dist/index.js" || (echo "❌ missing" && exit 1)

      - uses: actions/cache/save@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

  # ── 3. TypeScript strict check (all packages) ────────────────────
  typecheck:
    name: "Typecheck ${{ matrix.package }}"
    needs: build-packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - "@wallet/wallet-core"
          - "@app/desktop"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Typecheck ${{ matrix.package }}
        run: pnpm -F "${{ matrix.package }}" typecheck

  # ── 4. Unit tests + coverage ──────────────────────────────────────
  test:
    name: "Unit Tests"
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Run tests with coverage
        run: pnpm -F @app/desktop test -- --passWithNoTests --ci --coverage --verbose

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: apps/desktop/coverage/
          retention-days: 14
        continue-on-error: true

  # ── 5. Full build validation ──────────────────────────────────────
  build-check:
    name: "Build validation"
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            packages/wallet-core/dist
            packages/ui-tokens/dist
          key: packages-${{ github.sha }}

      - name: Build Electron main process
        run: pnpm -F @app/desktop build:main
        env:
          NODE_ENV: production

      - name: Build Vite renderer
        run: pnpm -F @app/desktop build:renderer
        env:
          NODE_ENV: production

      - name: Verify all build outputs
        run: |
          echo "=== Checking build outputs ==="
          test -f apps/desktop/dist/main.js && echo "✅ main.js" || (echo "❌ main.js missing" && exit 1)
          test -f apps/desktop/dist/preload.js && echo "✅ preload.js" || (echo "⚠️ preload.js not found (may be bundled)")
          test -d apps/desktop/dist/renderer && echo "✅ renderer/" || (echo "❌ renderer/ missing" && exit 1)
          test -f apps/desktop/dist/renderer/index.html && echo "✅ renderer/index.html" || (echo "❌ index.html missing" && exit 1)
          echo "=== All build outputs verified ==="

  # ── 6. CI gate — REQUIRED for merge ──────────────────────────────
  # This is the single check that branch protection requires.
  # It only passes if ALL jobs above succeeded.
  ci-gate:
    name: "CI Gate"
    if: always()
    needs: [install, build-packages, typecheck, test, build-check]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          echo "install:        ${{ needs.install.result }}"
          echo "build-packages: ${{ needs.build-packages.result }}"
          echo "typecheck:      ${{ needs.typecheck.result }}"
          echo "test:           ${{ needs.test.result }}"
          echo "build-check:    ${{ needs.build-check.result }}"
          echo ""

          FAILED=0
          for result in "${{ needs.install.result }}" "${{ needs.build-packages.result }}" "${{ needs.typecheck.result }}" "${{ needs.test.result }}" "${{ needs.build-check.result }}"; do
            if [ "$result" != "success" ]; then
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            echo "❌ CI FAILED — merge is BLOCKED"
            echo "Fix the issues in your branch and push again."
            exit 1
          fi

          echo "✅ ALL CHECKS PASSED — merge is allowed"
